<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>W-BOSS Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>W-BOSS 작업 대시보드</h1>

<div class="dashboard">
  <div class="card">
    <h3>전체 진행률</h3>
    <div id="progressBar"><div></div></div>
    <p id="progressText">0%</p>
  </div>
</div>

<div class="filters">
  <input id="searchInput" placeholder="검색...">

  <div>
    <strong>우선순위:</strong>
    <button class="filter-btn" data-priority="p0">P0</button>
    <button class="filter-btn" data-priority="p1">P1</button>
    <button class="filter-btn" data-priority="p2">P2</button>
  </div>

  <div>
    <strong>유형:</strong>
    <button class="type-btn" data-type="api">API</button>
    <button class="type-btn" data-type="ui">UI</button>
    <button class="type-btn" data-type="logic">LOGIC</button>
  </div>
</div>

<div id="app"></div>

<script src="app.js"></script>
</body>
</html>
